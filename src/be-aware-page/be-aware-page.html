<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Take a Breath</title>
    <link rel="stylesheet" href="be-aware-page.css" />
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">A moment of pause</p>

      <div class="breath" aria-hidden="true">
        <div class="breath-circle"></div>
        <span class="breath-text">Breathe</span>
      </div>

      <p class="message">
        You came here on purpose to step away from this site. Notice the urge
        without judging it — let it rise, and let it pass.
      </p>

      <p class="prompt" id="prompt"></p>
    </main>

    <script src="be-aware-page.js"></script>
  </body>
</html>
